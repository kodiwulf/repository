name: Validate Kodi repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile build tools
        run: python3 -m py_compile tools/*.py

      - name: Validate published repository
        run: python3 tools/validate_repo.py
