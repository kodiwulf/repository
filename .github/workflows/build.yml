name: Build and deploy Kodi repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate repository metadata and Jekyll navigation
        run: |
          python3 tools/build.py --root "$GITHUB_WORKSPACE" --cleanup-legacy
          python3 tools/build.py --root "$GITHUB_WORKSPACE" --base-url "https://kodi-wulf.github.io/repository/" --repo-version "1.0.1" --installer-only
          python3 tools/build.py --root "$GITHUB_WORKSPACE" --base-url "https://kodi-wulf.github.io/repository/" --site-only

      - name: Compile and validate build tools
        run: |
          python3 -m py_compile tools/*.py
          python3 tools/validate_repo.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
